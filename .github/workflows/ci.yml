name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Validate corpus
        run: python scripts/validate_corpus_v1.py
      - name: Validate bias correction
        run: python scripts/validate_bias_correction_v1.py
      - name: Run artifact smoke tests
        run: pytest tests/test_artifacts.py -v
      - name: Run ranking math unit tests
        run: PYTHONPATH=. pytest tests/test_ranking_math.py -v
