<svg viewBox="0 0 980 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="440" fill="url(#bg2)"/>

  <!-- Top banner -->
  <rect x="0" y="0" width="980" height="72" fill="#1e293b"/>
  <line x1="0" y1="72" x2="980" y2="72" stroke="#334155" stroke-width="1.5"/>

  <!-- HOLD badge -->
  <rect x="22" y="16" width="80" height="40" rx="8" fill="#92400e"/>
  <rect x="22" y="16" width="80" height="40" rx="8" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="62" y="33" text-anchor="middle" fill="#fde68a" font-size="9" font-weight="600" letter-spacing="1">DECISION</text>
  <text x="62" y="50" text-anchor="middle" fill="#fbbf24" font-size="17" font-weight="800">HOLD</text>

  <!-- Experiment title -->
  <text x="140" y="31" fill="#f1f5f9" font-size="14" font-weight="700">A/B Experiment: Hybrid Ranker vs Baseline</text>
  <text x="140" y="53" fill="#94a3b8" font-size="11">Temporal holdout evaluation · 4,132 sessions · 650 items · 41,320 impressions</text>

  <!-- Status pill -->
  <rect x="820" y="20" width="140" height="32" rx="8" fill="#1e3a8a"/>
  <text x="890" y="38" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">PULSERANK PLATFORM</text>

  <!-- METRIC CARDS ROW -->

  <!-- Card 1: Recall@100 -->
  <rect x="22" y="90" width="215" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="22" y="90" width="215" height="5" rx="2" fill="#7c3aed"/>
  <text x="129" y="120" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600" letter-spacing="1">CANDIDATE QUALITY</text>
  <text x="129" y="142" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Hybrid Recall@100</text>
  <text x="129" y="178" text-anchor="middle" fill="#c4b5fd" font-size="42" font-weight="800">0.690</text>
  <line x1="42" y1="198" x2="217" y2="198" stroke="#334155" stroke-width="1"/>
  <text x="129" y="218" text-anchor="middle" fill="#94a3b8" font-size="10">69% of purchased items appear</text>
  <text x="129" y="234" text-anchor="middle" fill="#94a3b8" font-size="10">in top-100 candidates per session</text>
  <text x="129" y="256" text-anchor="middle" fill="#6d28d9" font-size="9">Popularity + Content-Based Scorers</text>
  <text x="129" y="269" text-anchor="middle" fill="#6d28d9" font-size="9">merged via Hybrid Merge</text>

  <!-- Card 2: IPS NDCG -->
  <rect x="252" y="90" width="215" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="252" y="90" width="215" height="5" rx="2" fill="#1d4ed8"/>
  <text x="359" y="120" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600" letter-spacing="1">IPS DEBIASING — KEY RESULT</text>
  <text x="359" y="142" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">IPS NDCG@10</text>
  <!-- Before arrow after layout -->
  <text x="305" y="175" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">NAIVE</text>
  <text x="305" y="194" text-anchor="middle" fill="#f87171" font-size="34" font-weight="800">0.134</text>
  <text x="362" y="188" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="700">→</text>
  <text x="413" y="175" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">IPS</text>
  <text x="413" y="194" text-anchor="middle" fill="#4ade80" font-size="34" font-weight="800">0.522</text>
  <line x1="272" y1="208" x2="447" y2="208" stroke="#334155" stroke-width="1"/>
  <text x="359" y="228" text-anchor="middle" fill="#94a3b8" font-size="10">Same model · 4× better metric</text>
  <text x="359" y="244" text-anchor="middle" fill="#94a3b8" font-size="10">once position bias is corrected</text>
  <rect x="287" y="255" width="144" height="16" rx="4" fill="#1e3a8a"/>
  <text x="359" y="267" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="600">+289% NDCG lift from IPS</text>

  <!-- Card 3: Exposure Compliance -->
  <rect x="482" y="90" width="215" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="482" y="90" width="215" height="5" rx="2" fill="#065f46"/>
  <text x="589" y="120" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600" letter-spacing="1">GOVERNANCE</text>
  <text x="589" y="142" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Exposure Compliance</text>
  <text x="589" y="178" text-anchor="middle" fill="#4ade80" font-size="38" font-weight="800">PASS</text>
  <line x1="502" y1="198" x2="677" y2="198" stroke="#334155" stroke-width="1"/>
  <text x="589" y="218" text-anchor="middle" fill="#94a3b8" font-size="10">Seller Gini after rerank: 0.582</text>
  <text x="589" y="234" text-anchor="middle" fill="#94a3b8" font-size="10">Catalog coverage@10: 0.226</text>
  <text x="589" y="254" text-anchor="middle" fill="#94a3b8" font-size="10">MMR diversity constraint enforced</text>
  <text x="589" y="270" text-anchor="middle" fill="#065f46" font-size="9">80 sellers · Gini constraints active</text>

  <!-- Card 4: Attribution Window -->
  <rect x="712" y="90" width="246" height="185" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="712" y="90" width="246" height="5" rx="2" fill="#92400e"/>
  <text x="835" y="120" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="600" letter-spacing="1">DELAYED ATTRIBUTION</text>
  <text x="835" y="142" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Conversion Attribution</text>
  <text x="835" y="176" text-anchor="middle" fill="#fbbf24" font-size="38" font-weight="800">30-day</text>
  <text x="835" y="196" text-anchor="middle" fill="#fde68a" font-size="11">attribution window</text>
  <line x1="732" y1="208" x2="938" y2="208" stroke="#334155" stroke-width="1"/>
  <text x="835" y="228" text-anchor="middle" fill="#94a3b8" font-size="10">539 purchases attributed</text>
  <text x="835" y="244" text-anchor="middle" fill="#94a3b8" font-size="10">Last-touch impression model</text>
  <text x="835" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">Marketplace intent delay accounted</text>
  <text x="835" y="276" text-anchor="middle" fill="#92400e" font-size="9">33 JSON evidence artifacts</text>

  <!-- Decision Rationale panel -->
  <rect x="22" y="295" width="936" height="70" rx="12" fill="#1e293b" filter="url(#shadow2)"/>
  <rect x="22" y="295" width="6" height="70" rx="3" fill="#fbbf24"/>

  <text x="48" y="320" fill="#fde68a" font-size="11" font-weight="700">Why HOLD:</text>
  <text x="135" y="320" fill="#e2e8f0" font-size="11">Lift observed but not statistically significant at current traffic volume.</text>
  <text x="48" y="340" fill="#e2e8f0" font-size="11">IPS-corrected NDCG@10 improves from 0.134 → 0.522, confirming the model quality — but the offline A/B relative gain does not clear the significance threshold.</text>
  <text x="48" y="360" fill="#94a3b8" font-size="10">Recommendation: 2-week holdout extension · Monitor exposure Gini drift · Re-evaluate attribution at 60-day window · Decision logged in ab_simulation_results.json</text>

  <!-- Footer -->
  <rect x="0" y="390" width="980" height="50" fill="#0f172a"/>
  <line x1="0" y1="390" x2="980" y2="390" stroke="#1e293b" stroke-width="1"/>
  <text x="490" y="412" text-anchor="middle" fill="#475569" font-size="9">PULSERANK PLATFORM · Production-simulated marketplace ranking with IPS debiasing · 33 JSON evidence artifacts</text>
  <text x="490" y="430" text-anchor="middle" fill="#334155" font-size="8">github.com/SidharthKriplani/pulserank_platform</text>
</svg>
